body,
#app {

  }

  left: -20px;
  right: -20px;

  border-top-color: #b6b6f7;

}

  animation: clippath 3s infinite -1.5s linear;
}

  color: white;
  font-size: 20px;
  text-align: center;
}

  0% {
    filter: hue-rotate(0deg);
  }
  100% {
    filter: hue-rotate(360deg);
  }
}

@keyframes clippath {
  0% {

    -ms-transform: rotate(0deg);

  100% {
