#loader-wrapper {
  height: 150px;
  width: 150px;
  margin: auto auto;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: linear-gradient(45deg, gold, deeppink);
  animation: hue 3s infinite linear, pulse 2s infinite ease-in-out;
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.1);
  }
}

#loader-wrapper::before,
#loader-wrapper::after {
  content: "";
  position: absolute;
  top: -20px;
  bottom: -20px;
  left: -20px;
  right: -20px;
  border: 3px solid transparent;
  border-top-color: #b6b6f7;
  border-radius: 50%;
  clip-path: inset(0px round 10px);
  animation: clippath 3s infinite linear;
}

#loader-wrapper::after {
  animation: clippath 3s infinite -1.5s linear;
}

#loader-wrapper div {
  color: white;
  font-size: 20px;
  text-align: center;
}

@keyframes hue {
  0% {
    filter: hue-rotate(0deg);
  }
  100% {
    filter: hue-rotate(360deg);
  }
}

@keyframes clippath {
  0% {
    -webkit-transform: rotate(0deg);
    -ms-transform: rotate(0deg);
    transform: rotate(0deg);
  }
  100% {
    -webkit-transform: rotate(360deg);
    -ms-transform: rotate(360deg);
    transform: rotate(360deg);
  }
}

.bg {
  display: flex;
  justify-content: center;
  height: 100vh;
  align-items: center;
  background-color: #193c6d;

}
.tzd_txt {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  position: relative;
  &::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    background-image: linear-gradient(313deg, #003073 0%, #1a3c7f 50%, #029797 100%);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    clip-path: ellipse(60px 60px at 0% 50%);
    animation: move_lit 8s ease-in-out infinite;
  }
}

@keyframes move_lit {
  50% {
    clip-path: ellipse(60px 60px at 100% 50%);
  }

  100% {
    clip-path: ellipse(60px 60px at 0% 50%);
  }
